name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & test
    # macos-26 + Xcode 26: the app uses Liquid Glass APIs (e.g. SwiftUI `glassEffect`) that are
    # macOS 26 SDK symbols. `#available` gates them at runtime, but they must exist at compile time,
    # so an older runner SDK (macos-15 / Xcode 16) cannot build the app target.
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode (macOS 26 SDK)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Toolchain
        run: swift --version

      - name: Build
        run: swift build

      - name: Test
        run: swift test
