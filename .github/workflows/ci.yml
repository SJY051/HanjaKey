name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Toolchain
        run: swift --version

      - name: Build
        run: swift build

      - name: Test
        run: swift test
