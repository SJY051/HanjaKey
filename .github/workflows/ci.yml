name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: this workflow only reads the checkout (build/test, no writes or publishing).
permissions:
  contents: read

jobs:
  build-test:
    name: Build & test
    # macos-26 + Xcode 26: the app uses Liquid Glass APIs (e.g. SwiftUI `glassEffect`) that are
    # macOS 26 SDK symbols. `#available` gates them at runtime, but they must exist at compile time,
    # so an older runner SDK (macos-15 / Xcode 16) cannot build the app target.
    runs-on: macos-26
    steps:
      # Third-party actions pinned to immutable commit SHAs (supply-chain integrity); comment tracks the tag.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Select Xcode (macOS 26 SDK)
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1
        with:
          xcode-version: latest-stable

      - name: Toolchain
        run: swift --version

      - name: Build
        run: swift build

      - name: Test
        run: swift test
